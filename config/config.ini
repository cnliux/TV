[MAIN]
# 输出目录，所有生成的文件将保存到此目录
output_dir = outputs
# IP版本优先级 (both/ipv6/ipv4)
prefer_ip_version = both

[FETCHER]
# 请求超时时间（秒）
timeout = 5
# 并发请求数
concurrency = 10
# 最大重试次数
retries = 2

[TESTER]
# 测速超时时间（秒）
timeout = 5
# 并发测速数
concurrency = 10
# 最大尝试次数
max_attempts = 1
# 最小下载速度（KB/s）
min_download_speed = 0.2
# 是否显示测速日志
enable_logging = False
# 测速失败URL保存路径
failed_urls_path = config/failed_urls.txt

[EXPORTER]
# 是否包含未分类频道
include_uncategorized = False
# 未分类频道保存路径
uncategorized_channels_path = config/uncategorized_channels.txt
# 是否启用历史记录
enable_history = False
# EPG地址
m3u_epg_url = http://epg.51zmt.top:8000/cc.xml.gz
# 台标模板URL
m3u_logo_url = https://epg.v1.mk/logo/{name}.png

[URL_FILTER]
# 需要移除的URL参数（逗号分隔）
remove_params = key,playlive,authid

[PATHS]
# 订阅源URL列表路径
urls_path = config/urls.txt
# 分类模板路径
templates_path = config/templates.txt

[BLACKLIST]
# 黑名单文件路径
blacklist_path = config/blacklist.txt

[WHITELIST]
# 白名单文件路径
whitelist_path = config/whitelist.txt

[DEBUG]
# 是否显示详细日志
enable_debug_logging = False
# 是否记录日志到文件
log_to_file = False
