[MAIN]
# 输出目录，所有生成的文件将保存到此目录
output_dir = outputs

# IP版本优先级 (ipv6/ipv4)
# 注意：both 模式需要确保代码支持双栈逻辑
prefer_ip_version = ipv4

[FETCHER]
# 请求超时时间（秒）
timeout = 5

# 并发请求数（控制同时获取的订阅源数量）
concurrency = 2

# 最大重试次数（获取失败时重试次数）
retries = 2

[TESTER]
# 测速超时时间（秒）
timeout = 6

# 并发测速数（同时测速的频道数量）
concurrency = 6

# 最大尝试次数（测速失败重试次数）
max_attempts = 1

# 最小下载速度（KB/s）低于此值视为离线
min_download_speed = 0.2

# 是否显示测速日志（True/False）
enable_logging = True

# 测速失败URL保存路径
failed_urls_path = config/failed_urls.txt

[EXPORTER]
# 是否包含未分类频道（True/False）
# 设置为True时，未分类频道会出现在主列表
include_uncategorized = False

# 未分类频道保存路径
uncategorized_channels_path = config/uncategorized_channels.txt

# EPG地址（电子节目指南URL）
m3u_epg_url = http://epg.51zmt.top:8000/cc.xml.gz

# 台标模板URL（{name}会被替换为频道名称）
m3u_logo_url = https://epg.v1.mk/logo/{name}.png

# 注意：以下参数已移除
# enable_history = False  # 此参数未使用已被移除

[URL_FILTER]
# 需要移除的URL参数（逗号分隔）
# 这些参数会在解析URL时被自动删除
remove_params = key,playlive,authid

[PATHS]
# 订阅源URL列表路径（每行一个订阅源地址）
urls_path = config/urls.txt

# 分类模板路径（频道分类规则文件）
templates_path = config/templates.txt

[BLACKLIST]
# 黑名单文件路径（过滤无效频道）
blacklist_path = config/blacklist.txt

[WHITELIST]
# 白名单文件路径（保护重要频道）
whitelist_path = config/whitelist.txt

[DEBUG]
# 是否显示详细日志（True/False）
enable_debug_logging = True

# 是否记录日志到文件（True/False）
log_to_file = False
